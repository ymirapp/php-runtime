; Send PHP-FPM logs to stderr so Lambda writes them to CloudWatch.
; Writing to disk is not useful because Lambda instances are ephemeral.
error_log = /proc/self/fd/2
pid = /tmp/.ymir/php-fpm.pid
; Keep the default PHP-FPM log level.
; Raising it to "warning" reduces noise, but it can also hide uncaught PHP
; exceptions and fatal errors from the FPM error log in this environment.
;log_level = 'warning'

; Set the maximum message length written to stderr to avoid PHP-FPM truncating long errors
log_limit = 256000

[default]
pm = static
; We only need one child because a lambda can process only one request at a time
pm.max_children = 1
listen = /tmp/.ymir/php-fpm.sock
; Allows PHP processes to access the lambda's environment variables
clear_env = no
; Forward worker stdout and stderr through PHP-FPM so they also reach CloudWatch.
catch_workers_output = yes
; Keep worker output readable by removing the default PHP-FPM log prefix.
decorate_workers_output = no
; Limit core dump output so repeated crashes do not fill `/tmp`.
rlimit_core = 1
